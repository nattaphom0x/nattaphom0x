name: Update GitHub Stats SVG

on:
  schedule:
    - cron: "0 0 * * *"   # run once a day at midnight UTC
  workflow_dispatch:        # allow manual trigger from the Actions tab
  push:
    branches: [main]

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate SVGs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: nattaphom0x
        run: python generate_stats.py

      - name: Commit updated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add light_mode.svg dark_mode.svg
          git commit -m "Update stats" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
